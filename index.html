    <script>
      // ลิงก์ Google Apps Script Web App สำหรับรับข้อมูลผ่าน API
      const webAppUrl = "https://script.google.com/macros/s/AKfycbxUyW-3CGkfR7mAYJXr2Jq4gmZ1AtFluKiaGHvGCInsLxtAOs4bYQPQUWb4T2xg91KR/exec";

      function findCode() {
        document.getElementById('search').innerHTML = ''
        var code = document.getElementById("idMeter").value;
        // document.getElementById("loader").style.visibility = "visible"; 
        $('#search-btn').hide()
        $('#btn2').show()

        if(document.getElementById('idMeter').value == "" ){
          document.getElementById("output").innerHTML = "<div class='alert alert-danger' role='alert'>กรุณาพิมพ์หมายเลขมิเตอร์</div>";
          setTimeout(function(){
            document.getElementById('output').innerHTML= ""; 
          }, 1500);  
          $('#search-btn').show()
          $('#btn2').hide()
        } else {
          // ใช้ fetch() ส่งค่าไปยัง Google Apps Script แทน google.script.run
          fetch(`${webAppUrl}?code=${encodeURIComponent(code)}`)
            .then(response => {
              if (!response.ok) {
                throw new Error('Network response was not ok');
              }
              return response.text(); // เปลี่ยนเป็น .json() ได้หากฝั่ง Apps Script คืนค่าแบบ JSON
            })
            .then(data => {
              updateData(data);
            })
            .catch(error => {
              console.error('Error fetching data:', error);
              Swal.fire({
                position: 'center',
                icon: 'error',
                title: 'เกิดข้อผิดพลาดในการเชื่อมต่อ',
                text: 'กรุณาลองใหม่อีกครั้ง หรือตรวจสอบสิทธิ์การแชร์ของ Google Script',
                showConfirmButton: true
              });
              $('#search-btn').show();
              $('#btn2').hide();
            });
        }
      }

      function updateData(data) {
        if(data == '<center>*ไม่พบข้อมูล<br><img src="https://ltschool.web.app/pic/falseok.gif" width="200" height="200"></center>'){
          Swal.fire({
            position: 'center',
            icon: 'error',
            title: 'ไม่พบข้อมูลของคุณ',
            showConfirmButton: false,
            timer: 1500
          })
          document.getElementById("search").innerHTML = data;
          $('#search-btn').show()
          $('#btn2').hide()
          if (typeof M !== 'undefined') { M.updateTexfields(); }
        } else {
          Swal.fire({
            position: 'center',
            icon: 'success',
            title: 'ยินดีด้วยพบข้อมูลแล้ว',
            showConfirmButton: false,
            timer: 2000
          })
          document.getElementById('idMeter').value = ''
          document.getElementById("search").innerHTML = data;
          $('#search-btn').show()
          $('#btn2').hide()

          if (typeof M !== 'undefined') { M.updateTexfields(); }
        }
      }
      window.onload = function(){document.getElementById("search-btn").style.visibility="visible"}
    </script>
